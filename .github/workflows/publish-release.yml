name: Publish and Release

# Ensure Actions token has rights to create releases and upload artifacts
permissions:
  contents: write
  packages: write
  actions: read

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & Publish
        shell: pwsh
        run: |
          dotnet restore csharp/ToastCloser/ToastCloser.csproj
          # Publish framework-dependent folder (no self-contained) to match local publish output
          dotnet publish csharp/ToastCloser/ToastCloser.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            /p:PublishSingleFile=false `
            /p:PublishTrimmed=false `
            -o publish/ToastCloser/win-x64

      - name: Zip publish folder
        shell: pwsh
        run: |
          $out = "${{ github.workspace }}\publish\ToastCloser\win-x64"
          $zip = "${{ github.workspace }}\publish\ToastCloser_win-x64.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "$out\*" -DestinationPath $zip -Force

      - name: Upload artifact (workflow artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ToastCloser-win-x64
          path: publish/ToastCloser_win-x64.zip

      - name: Generate release notes from CHANGELOG.md
        if: startsWith(github.ref, 'refs/tags/')
        id: generate_release_notes
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          pwsh -NoProfile -File .\scripts\generate-release-body.ps1 -Tag $tag -OutFile release-notes-$tag.md
          $body = Get-Content "release-notes-$tag.md" -Raw
          # Set step output 'body' using GITHUB_OUTPUT file
          "body<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $body | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # Note: do not call `gh auth login` here. Instead pass GITHUB_TOKEN to steps that invoke gh.

      - name: Delete existing GitHub Release(s) for this tag (any state)
        if: startsWith(github.ref, 'refs/tags/')
        id: delete_old_release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          $tag = '${{ github.ref_name }}'
          $repo = $env:REPO
          $uri = "https://api.github.com/repos/$repo/releases?per_page=100"
          $headers = @{ Authorization = "token $env:GITHUB_TOKEN"; "User-Agent" = "actions" }
          try {
            # List releases and delete any whose tag_name matches, regardless of draft/published state
            $releases = Invoke-RestMethod -Uri $uri -Headers $headers -Method Get -ErrorAction Stop
            $matches = $releases | Where-Object { $_.tag_name -eq $tag }
            if ($matches -and $matches.Count -gt 0) {
              foreach ($r in $matches) {
                Write-Output "Found release id $($r.id) with tag $($r.tag_name). Deleting..."
                $delUri = "https://api.github.com/repos/$repo/releases/$($r.id)"
                Invoke-RestMethod -Uri $delUri -Headers $headers -Method Delete -ErrorAction Stop
                Write-Output "Deleted release id $($r.id)."
              }
            } else {
              Write-Output "No releases found matching tag $tag"
            }
          } catch {
            Write-Output "Error querying/deleting releases: $($_.Exception.Message)"
          }

      - name: Create GitHub Release and upload asset (when tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: publish/ToastCloser_win-x64.zip
          body: ${{ steps.generate_release_notes.outputs.body }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
