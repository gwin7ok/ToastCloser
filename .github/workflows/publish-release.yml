name: Publish and Release

# Ensure Actions token has rights to create releases and upload artifacts
permissions:
  contents: write
  packages: write
  actions: read

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & Publish
        shell: pwsh
        run: |
          dotnet restore csharp/ToastCloser/ToastCloser.csproj
          # Publish framework-dependent folder (no self-contained) to match local publish output
          dotnet publish csharp/ToastCloser/ToastCloser.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            /p:PublishSingleFile=false `
            /p:PublishTrimmed=false `
            -o publish/ToastCloser/win-x64

      - name: Zip publish folder
        shell: pwsh
        run: |
          $out = "${{ github.workspace }}\publish\ToastCloser\win-x64"
          $zip = "${{ github.workspace }}\publish\ToastCloser_win-x64.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "$out\*" -DestinationPath $zip -Force

      - name: Upload artifact (workflow artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ToastCloser-win-x64
          path: publish/ToastCloser_win-x64.zip

      - name: Generate release notes from CHANGELOG.md
        if: startsWith(github.ref, 'refs/tags/')
        id: generate_release_notes
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          pwsh -NoProfile -File .\scripts\generate-release-body.ps1 -Tag $tag -OutFile release-notes-$tag.md
          $body = Get-Content "release-notes-$tag.md" -Raw
          # Set step output 'body' using GITHUB_OUTPUT file
          "body<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $body | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Authenticate gh CLI (use GITHUB_TOKEN)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $token = '${{ secrets.GITHUB_TOKEN }}'
          if (-not $token) { Write-Error 'GITHUB_TOKEN not set'; exit 1 }
          $token | gh auth login --with-token
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Handle existing release (delete draft / edit published)
        if: startsWith(github.ref, 'refs/tags/')
        id: handle_release
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $repo = '${{ github.repository }}'
          $action = 'create'
          try {
            $exists = & gh release view $tag --repo $repo > $null 2>&1; $rc = $LASTEXITCODE
            if ($rc -eq 0) {
              $relJson = & gh release view $tag --repo $repo --json id,draft 2>$null
              if ($relJson) {
                $rel = $relJson | ConvertFrom-Json
                if ($rel.draft -eq $true) {
                  Write-Host "Found draft release $tag; deleting draft to recreate."
                  gh release delete $tag --repo $repo --yes 2>$null
                  $action = 'create'
                } else {
                  Write-Host "Found published release $tag; updating notes and assets."
                  gh release edit $tag --repo $repo --notes-file release-notes-$tag.md 2>$null
                  gh release upload $tag publish/ToastCloser_win-x64.zip --repo $repo --clobber 2>$null
                  $action = 'done'
                }
              }
            }
          } catch {
            Write-Host "Handle existing release: error - $_"
          }
          "action=$action" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create GitHub Release and upload asset (when tagged)
        if: startsWith(github.ref, 'refs/tags/') && steps.handle_release.outputs.action == 'create'
        uses: softprops/action-gh-release@v1
        with:
          files: publish/ToastCloser_win-x64.zip
          body: ${{ steps.generate_release_notes.outputs.body }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
